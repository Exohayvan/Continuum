name: Test and SonarQube Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test_coverage:
    name: Coverage (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest
          - os: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        shell: bash
        run: go test ./... -coverprofile=coverage.out

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out
          if-no-files-found: error

  sonarqube:
    name: SonarQube
    needs: test_coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download coverage profiles
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-artifacts

      - name: Merge coverage profiles
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          profiles = sorted(Path("coverage-artifacts").glob("*/coverage.out"))
          if not profiles:
              raise SystemExit("no coverage profiles found")

          mode = None
          merged = {}
          for profile in profiles:
              lines = profile.read_text(encoding="utf-8").splitlines()
              if not lines:
                  continue

              profile_mode = lines[0].strip()
              if mode is None:
                  mode = profile_mode
              elif mode != profile_mode:
                  raise SystemExit(f"coverage mode mismatch: {profile_mode} != {mode}")

              for line in lines[1:]:
                  if not line.strip():
                      continue

                  block, count_text = line.rsplit(" ", 1)
                  count = int(count_text)
                  current = merged.get(block)
                  if current is None:
                      merged[block] = count
                  elif mode == "mode: set":
                      merged[block] = max(current, count)
                  else:
                      merged[block] = current + count

          with Path("coverage.out").open("w", encoding="utf-8") as handle:
              handle.write(f"{mode}\n")
              for block in sorted(merged):
                  handle.write(f"{block} {merged[block]}\n")

          print(f"Merged {len(profiles)} coverage profiles into coverage.out")
          PY

      - name: Install SonarScanner CLI
        shell: bash
        run: |
          SCANNER_VERSION="8.0.1.6346"
          SCANNER_ZIP="sonar-scanner-cli-${SCANNER_VERSION}-linux-x64.zip"
          curl --location --output "${RUNNER_TEMP}/${SCANNER_ZIP}" \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${SCANNER_ZIP}"
          unzip -q "${RUNNER_TEMP}/${SCANNER_ZIP}" -d "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/sonar-scanner-${SCANNER_VERSION}-linux-x64/bin" >> "${GITHUB_PATH}"

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -Dsonar.projectBaseDir=.
