name: Test and SonarQube Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Install SonarScanner CLI
        shell: bash
        run: |
          SCANNER_VERSION="8.0.1.6346"
          SCANNER_ZIP="sonar-scanner-cli-${SCANNER_VERSION}-linux-x64.zip"
          curl --location --output "${RUNNER_TEMP}/${SCANNER_ZIP}" \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${SCANNER_ZIP}"
          unzip -q "${RUNNER_TEMP}/${SCANNER_ZIP}" -d "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/sonar-scanner-${SCANNER_VERSION}-linux-x64/bin" >> "${GITHUB_PATH}"

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -Dsonar.projectBaseDir=.
