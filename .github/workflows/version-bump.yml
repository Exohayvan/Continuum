name: Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - src/version.yaml

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip version bump]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Collect pushed commit messages
        shell: bash
        run: |
          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            git log -1 --format=%B "${{ github.sha }}" > "${RUNNER_TEMP}/commit-messages.txt"
          else
            git log --format=%B "${{ github.event.before }}..${{ github.sha }}" > "${RUNNER_TEMP}/commit-messages.txt"
          fi

      - name: Bump version file
        run: go run ./src/cmd/versionbump -file src/version.yaml -messages-file "${RUNNER_TEMP}/commit-messages.txt"

      - name: Commit updated version
        shell: bash
        run: |
          if git diff --quiet -- src/version.yaml; then
            echo "No version change to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/version.yaml
          git commit -m "chore: bump version [skip version bump]"
          git push
