name: Version Bump

on:
  workflow_dispatch:

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Resolve version baseline
        shell: bash
        run: |
          release_tag=""

          for pattern in 'v[0-9]*.[0-9]*.[0-9]*' '[0-9]*.[0-9]*.[0-9]*'; do
            release_tag="$(git describe --tags --abbrev=0 --match "${pattern}" 2>/dev/null || true)"
            if [[ -n "${release_tag}" ]]; then
              break
            fi
          done

          if [[ -n "${release_tag}" ]]; then
            echo "BASE_VERSION=${release_tag#v}" >> "${GITHUB_ENV}"
            echo "COMMIT_RANGE=${release_tag}..${{ github.sha }}" >> "${GITHUB_ENV}"
          else
            base_version="$(awk -F': *' '
              $1 == "major" { major=$2 }
              $1 == "minor" { minor=$2 }
              $1 == "patch" { patch=$2 }
              END { printf "%s.%s.%s", major, minor, patch }
            ' src/version.yaml)"

            last_version_commit="$(git log -n 1 --format=%H -- src/version.yaml 2>/dev/null || true)"
            if [[ -n "${last_version_commit}" ]]; then
              commit_range="${last_version_commit}..${{ github.sha }}"
            else
              commit_range="${{ github.sha }}"
            fi

            echo "BASE_VERSION=${base_version}" >> "${GITHUB_ENV}"
            echo "COMMIT_RANGE=${commit_range}" >> "${GITHUB_ENV}"
          fi

      - name: Collect commit messages since baseline
        shell: bash
        run: |
          : > "${RUNNER_TEMP}/commit-messages.txt"

          while IFS= read -r commit_sha; do
            subject="$(git show -s --format=%s "${commit_sha}")"
            if [[ "${subject}" == *"[skip version bump]"* ]]; then
              continue
            fi

            git show -s --format=%B "${commit_sha}" >> "${RUNNER_TEMP}/commit-messages.txt"
            printf '\0' >> "${RUNNER_TEMP}/commit-messages.txt"
          done < <(git log --reverse --format=%H "${COMMIT_RANGE}")

      - name: Bump version file
        run: go run ./src/cmd/versionbump -file src/version.yaml -messages-file "${RUNNER_TEMP}/commit-messages.txt" -base-version "${BASE_VERSION}"

      - name: Commit updated version
        shell: bash
        run: |
          if git diff --quiet -- src/version.yaml src/version/runtime_default.go; then
            echo "No version change to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/version.yaml src/version/runtime_default.go
          git commit -m "chore: bump version [skip version bump] [skip desktop build]"
          git push origin "HEAD:${{ github.ref_name }}"
