<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Continuum</title>
    <link href="/main.css" rel="stylesheet"/>
</head>
<body>
<dialog class="update-modal" id="update-dialog" aria-labelledby="update-title">
    <p class="eyebrow">Update Required</p>
    <h2 id="update-title">A newer Continuum build is available.</h2>
    <p class="update-copy" id="update-message">
        Continuum will auto update in 15 seconds.
    </p>
    <div class="update-actions">
        <button id="update-now" type="button">Update Now</button>
        <button class="button-secondary" id="exit-app" type="button">Exit</button>
    </div>
</dialog>
<main class="shell">
    <section class="card">
        <p class="eyebrow">Continuum</p>
        <p class="meta">Version <span id="version">Loading...</span></p>
        <h1>Node Identity</h1>
        <p class="lede">
            This desktop shell is running locally and displaying the NodeID generated from this machine.
        </p>

        <div class="nodeid" id="nodeid">Loading NodeID...</div>

        <div class="actions">
            <button id="refresh" type="button">Refresh NodeID</button>
            <span class="status" id="status">Resolving NodeID...</span>
        </div>
    </section>
</main>
<script src="/main.js" type="module"></script>
</body>
</html>
